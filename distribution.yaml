name: kasio
version: 2.1.0
description: "KASIO — Telegram bot catatan keuangan dengan Notion DB. Plugin + skill ter-bundle."
hermes_requires: ">=0.12.0"
author: "Paduka (Aris Sunandar)"
license: "MIT"

# Installer `install-kasio.{ps1,sh}` sekarang install plugin + skill langsung
# ke profile Hermes yang SEDANG AKTIF, tidak membuat profile baru.
# Source files ada di plugins/ dan skills/ (subfolder repo ini).

env_requires:
  - name: NOTION_API_KEY
    description: "Notion integration API key. Buat di https://www.notion.so/my-integrations"
    required: true

  - name: KASIO_TRANSACTIONS_DS_ID
    description: "Notion data source ID untuk transactions DB"
    required: true

  - name: KASIO_ACCOUNTS_DS_ID
    description: "Notion data source ID untuk accounts DB"
    required: true

  - name: MINIMAX_API_KEY
    description: "MiniMax M3 API key untuk vision reading struk/screenshot. Optional."
    required: false

distribution_owned:
  - plugins/
  - skills/
  - distribution.yaml
  - install-kasio.ps1
  - install-kasio.sh
